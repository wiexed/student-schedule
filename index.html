<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расписание</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
</head>
<body>

    <section id="tab-today" class="tab-content active">
        <header>
            <h1 id="month-name">Апрель</h1>
            <div id="date-picker" class="date-picker"></div>
        </header>
        <div id="today-list" class="lessons-container"></div>
    </section>

    <section id="tab-week" class="tab-content">
        <header><h1>Вся неделя</h1></header>
        <div id="full-schedule" class="lessons-container"></div>
    </section>

    <section id="tab-settings" class="tab-content">
        <header><h1>Настройки</h1></header>
        <div class="card">
            <h3>Добавить пару</h3>
            <input id="subject" placeholder="Предмет">
            <select id="day">
                <option value="Понедельник">Понедельник</option>
                <option value="Вторник">Вторник</option>
                <option value="Среда">Среда</option>
                <option value="Четверг">Четверг</option>
                <option value="Пятница">Пятница</option>
            </select>
            <select id="week-type">
                <option value="both">Всегда</option>
                <option value="num">Нечетная (новая)</option>
                <option value="den">Четная (старая)</option>
            </select>
            <input id="time" placeholder="08:30-09:55">
            <input id="room" placeholder="Аудитория">
            <button onclick="addLesson()">Добавить</button>
        </div>
        <button onclick="resetToDefault()" class="reset-btn">Сбросить расписание</button>
    </section>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="switchTab('tab-today', this)">
            <span class="icon">📅</span><label>График</label>
        </div>
        <div class="tab-item" onclick="switchTab('tab-week', this)">
            <span class="icon">🗓</span><label>Неделя</label>
        </div>
        <div class="tab-item" onclick="switchTab('tab-settings', this)">
            <span class="icon">⚙️</span><label>Настройки</label>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
